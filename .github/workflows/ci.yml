name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: make test (${{ matrix.cc }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang

      - name: Build and test
        run: |
          make clean
          make test CC=${{ matrix.cc }}

      - name: Smoke-test install target
        run: |
          make install CC=${{ matrix.cc }} DESTDIR="$PWD/install-root" PREFIX=/usr/local
          test -x "$PWD/install-root/usr/local/bin/0pty"
          test -x "$PWD/install-root/usr/local/bin/0pty-server"
